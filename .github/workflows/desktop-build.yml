name: Desktop Builds

on:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm --prefix frontend-nuxt ci

      - name: Install desktop dependencies
        run: npm --prefix desktop ci

      - name: Build desktop app
        run: npm --prefix desktop run build:desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qrcodism-desktop-${{ matrix.os }}
          path: desktop/dist/**
